services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sjtu_contest_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ./backend/.env:/app/.env:ro
      - ./backend/logs:/app/logs
    networks:
      - sjtu_contest_net

  backend-cron:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      TZ: Asia/Shanghai
    volumes:
      - ./backend/.env:/app/.env:ro
      - ./backend/logs:/app/logs
    entrypoint: ["/app/cron-entrypoint.sh"]
    networks:
      - sjtu_contest_net

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - sjtu_contest_net

volumes:
  postgres_data:

networks:
  sjtu_contest_net:
    driver: bridge
